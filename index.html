<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Telemetry Globe</title>
    
    <!-- Import Cesium's CSS -->
    <link href="node_modules/cesium/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="controls">
        <button onclick="focusOnShanghai()">Focus on Shanghai Circuit</button>
    </div>
    <div id="playback-controls">
        <button class="playback-btn active" data-speed="1">x1</button>
        <button class="playback-btn" data-speed="2">x2</button>
        <button class="playback-btn" data-speed="4">x4</button>
        <button class="playback-btn" data-speed="6">x6</button>
        <button class="playback-btn" data-speed="8">x8</button>
        <button class="playback-btn" data-speed="10">x10</button>
    </div>
    <div id="cesiumContainer"></div>

    <!-- Import Cesium's JS -->
    <script src="node_modules/cesium/Build/Cesium/Cesium.js"></script>
    <script src="app.js"></script>

</body>
</html>
